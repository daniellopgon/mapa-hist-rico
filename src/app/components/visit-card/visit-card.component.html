<div class="visit-card" [class.visit-card--con-imagen]="esConImagen" [class.visit-card--basica]="!esConImagen">
    @if (esConImagen) {
        <img [src]="infoCiudad.imagen" class="visit-card__imagen-fondo" [alt]="infoCiudad.nombre">
        <div class="visit-card__capa-oscura"></div>
        <div class="visit-card__gradiente"></div>
    }
    
    <div class="visit-card__contenido">
        <h2 class="visit-card__titulo">{{ infoCiudad.nombre }}</h2>
        
        @if (!esConImagen) {
            <p class="visit-card__subtitulo">{{ visita().nombre }}</p>
            <p class="visit-card__info">{{ visita().cliente || '' }} · {{ visita().direccion || '' }}</p>
            @if (visita().marcadores.length) {
                <span class="visit-card__etiqueta">📍 {{ visita().marcadores.length }} paradas</span>
            }
        }
        
        <div class="visit-card__contenedor-botones">
            <button class="visit-card__btn-primario" (click)="descargar.emit()">Descargar</button>
            <button class="visit-card__btn-accion" (click)="verMapa.emit()">Ver Mapa</button>
        </div>
    </div>
</div>
