<div style="font-family: 'Inter', sans-serif; text-align: center;">
    <b style="font-size: 18px; color: #1a1a2e; text-transform: uppercase;">{{ marcador.nombre }}</b>

    @if (marcador.imagen) {
      <img [src]="marcador.imagen" [alt]="marcador.nombre" 
           style="width: 200px; height: 200px; object-fit: cover; border-radius: 8px; margin: 10px auto; display: block; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
    }

    @if (marcador.descripcion) {
      <p style="font-size: 14px; color: #444; line-height: 1.4; margin: 0; text-align: left; padding: 5px;">
        {{ marcador.descripcion }}
      </p>
    }
</div>
