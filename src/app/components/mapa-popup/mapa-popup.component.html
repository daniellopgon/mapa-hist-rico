<div style="font-family: 'Inter', sans-serif; text-align: center;">
    <b style="font-size: 8px; color: #1a1a2e; text-transform: uppercase;">{{ marcador().nombre }}</b>

    @if (marcador().imagen) {
      <img [src]="marcador().imagen" [alt]="marcador().nombre" 
           style="width: 100%; max-width: 45px; border-radius: 3px; margin: 2px auto; display: block; box-shadow: 0 1px 2px rgba(0,0,0,0.15);">
    }

    @if (marcador().descripcion) {
      <p style="font-size: 7px; color: #444; line-height: 1.1; margin: 0; text-align: left;">
        {{ marcador().descripcion }}
      </p>
    }
</div>
