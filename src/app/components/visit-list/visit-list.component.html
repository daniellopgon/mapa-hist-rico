<div class="visit-list-container" style="padding: 1rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
  <button class="btn-borrar-todo" (click)="borrarTodo()" style="margin-bottom: 1rem;">Borrar datos locales</button>

  @if (mapState.estadoCarga() === 'loading') {
    <p>Cargando visitas...</p>
  } @else if (mapState.estadoCarga() === 'error') {
    <p>Error al cargar las visitas.</p>
  } @else {
    @for (visita of mapState.visitas(); track visita.id) {
      <app-visit-card 
        [visita]="visita" 
        (descargar)="descargar(visita)" 
        (verMapa)="verMapa(visita)">
      </app-visit-card>
    }
  }
</div>
